# On pushing a tag like v0.3.2, publish to nuget.org and create a GitHub release.
# Use publish-release.ps1 to push a release.
name: release

on:
  push:
    tags:
    - "v[0-9]+.*" # not a regex! ".*" means a period followed by any character https://docs.github.com/en/actions/reference/workflow-syntax-for-github-actions#filter-pattern-cheat-sheet

permissions:
  contents: write # needed to create the GitHub release

jobs:
  build:

    runs-on: windows-latest

    steps:
    - uses: actions/checkout@230611dbd0eb52da1e1f4f7bc8bb0c3a339fc8b7
    
    - name: Install Dotnet
      uses: actions/setup-dotnet@607fce577a46308457984d59e4954e075820f10a
      with:
        dotnet-version: '10.0.x'
      
    - name: Dotnet Installation Info
      run: dotnet --info
      
    # Pack the platform-specific ReadyToRun tool. PackRidSpecific opts into the RID/R2R settings in CSharpRepl.csproj.
    # It creates:
    #   - one R2R-crossgen'd nuget package per RID
    #   - one fallback "any" package for unknown architectures
    #   - the root package that selects the right one at install time.
    - name: Pack
      run: dotnet pack CSharpRepl/CSharpRepl.csproj -c Release /p:ContinuousIntegrationBuild=true /p:PackRidSpecific=true

    # Publish the per-RID packages and the "any" fallback first. The root package is a "pointer"
    # that resolves to one of these at install time, so it must be published last (next step) to
    # avoid a window where it's available but the packages it points to are not.
    # --skip-duplicate makes a re-run safe if an earlier push published only some of the packages.
    - name: Publish architecture-specific packages
      shell: pwsh
      run: |
        cd CSharpRepl/nupkg
        ls
        $version = '${{ github.ref_name }}'.TrimStart('v')
        $rootPackage = "CSharpRepl.$version.nupkg"
        Get-ChildItem CSharpRepl.*.nupkg -Exclude $rootPackage | ForEach-Object {
            dotnet nuget push $_.Name --api-key=${{ secrets.NUGET_TOKEN }} --source https://api.nuget.org/v3/index.json --skip-duplicate
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
        }

    # Publish the root "pointer" package last, now that the packages it resolves to are available.
    - name: Publish root package
      shell: pwsh
      run: |
        cd CSharpRepl/nupkg
        $version = '${{ github.ref_name }}'.TrimStart('v')
        dotnet nuget push "CSharpRepl.$version.nupkg" --api-key=${{ secrets.NUGET_TOKEN }} --source https://api.nuget.org/v3/index.json --skip-duplicate

    # Pull the notes for this version straight out of CHANGELOG.md so the GitHub release
    # mirrors what's already curated there (CHANGELOG.md is the single source of truth).
    - name: Extract release notes from CHANGELOG
      shell: pwsh
      run: |
        $version = '${{ github.ref_name }}'.TrimStart('v')
        $changelog = Get-Content -Raw CHANGELOG.md
        $escaped = [regex]::Escape($version)
        $match = [regex]::Match($changelog, "(?ms)^## Release $escaped[ \t]*\r?\n(.*?)(?=\r?\n## Release |\z)")
        if (-not $match.Success) {
            Write-Error "Could not find a '## Release $version' section in CHANGELOG.md"
            exit 1
        }
        Set-Content -Path release-notes.md -Value $match.Groups[1].Value.Trim()

    - name: Create GitHub release
      shell: pwsh
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: gh release create "${{ github.ref_name }}" --title "${{ github.ref_name }}" --notes-file release-notes.md --verify-tag
